name: Bot Noticias Chile

on:
  schedule:
    # ── Horarios Santiago (UTC-3 verano, UTC-4 invierno) ─────────────────────
    # 07:30 Santiago = 10:30 UTC  → reporte completo del dia
    # 12:00 Santiago = 15:00 UTC  → chequeo de urgentes
    # 15:00 Santiago = 18:00 UTC  → chequeo de urgentes
    # 18:00 Santiago = 21:00 UTC  → chequeo de urgentes
    - cron: "30 10 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de ejecucion: full o alert"
        required: false
        default: "full"

# Necesario para que el bot pueda publicar en GitHub Pages
permissions:
  contents: write

jobs:
  ejecutar-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO:          ${{ secrets.WHATSAPP_TO }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
        run: |
          # Si fue ejecucion manual, usa el modo del input
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            MODE="${{ github.event.inputs.mode }}"
          # Si son las 10 UTC (07:30 Santiago), reporte completo
          elif [ "$(date -u +%H)" = "10" ]; then
            MODE="full"
          # Cualquier otro horario: chequeo de alertas
          else
            MODE="alert"
          fi
          echo "Modo seleccionado: $MODE"
          python bot.py $MODE
