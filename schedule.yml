name: 📰 Bot Noticias Chile

on:
  # ── Horarios automáticos ──────────────────────────────────────────────────
  # Chile está en UTC-3 (horario de verano) o UTC-4 (invierno).
  # Reporte mañana  → 08:00 Santiago = 11:00 UTC (verano) / 12:00 UTC (invierno)
  # Reporte tarde   → 17:00 Santiago = 20:00 UTC (verano) / 21:00 UTC (invierno)
  # Usamos 11:00 y 20:00 UTC (ajusta a 12:00 y 21:00 entre mayo-agosto)
  schedule:
    - cron: "0 11 * * *"   # 08:00 AM Santiago (horario de verano)
    - cron: "0 20 * * *"   # 05:00 PM Santiago (horario de verano)

  # ── Ejecución manual desde GitHub (para probar) ───────────────────────────
  workflow_dispatch:
    inputs:
      motivo:
        description: "Motivo de ejecución manual (opcional)"
        required: false
        default: "Prueba manual"

jobs:
  generar-y-enviar-reporte:
    name: Generar y enviar reporte
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Descarga el código del repositorio
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instala Python 3.11
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Instala las dependencias
      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      # 4. Ejecuta el bot (usa los Secrets configurados en GitHub)
      - name: 🤖 Ejecutar bot de noticias
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID:     ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:      ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:   ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO:            ${{ secrets.WHATSAPP_TO }}
        run: python bot.py

      # 5. Si algo falla, notifica en el log de GitHub Actions
      - name: ❌ Notificar fallo
        if: failure()
        run: |
          echo "El bot falló. Revisa los logs arriba para ver el error."
          echo "Errores comunes:"
          echo "  - API key incorrecta o sin crédito"
          echo "  - Credenciales de Twilio incorrectas"
          echo "  - Número de WhatsApp no verificado en Twilio"
